  <text x="664" y="134" font-size="14" font-weight="700" fill="#1f8a3a">Inside  ●  (91 dots)</text>
  <text x="664" y="158" font-size="12" fill="#222">Hit the quarter-circle.</text>
  <text x="664" y="176" font-size="12" fill="#222">Condition:  x² + y² ≤ 1</text>
  <rect x="650" y="205" width="250" height="80" rx="8" fill="white" stroke="#d62828" stroke-width="2"/>
  <text x="664" y="229" font-size="14" font-weight="700" fill="#d62828">Outside  ●  (29 dots)</text>
  <text x="664" y="253" font-size="12" fill="#222">Missed the quarter-circle.</text>
  <text x="664" y="271" font-size="12" fill="#222">Condition:  x² + y² > 1</text>
  <rect x="650" y="300" width="250" height="80" rx="8" fill="white" stroke="#1f5fa6" stroke-width="2"/>
  <text x="664" y="324" font-size="14" font-weight="700" fill="#1f5fa6">The maths trick</text>
  <text x="664" y="348" font-size="12" fill="#222">Square area = 1.</text>
  <text x="664" y="366" font-size="12" fill="#222">Quarter-circle area = π / 4.</text>
  <rect x="650" y="395" width="250" height="170" rx="8" fill="#fff7e6" stroke="#d99a00" stroke-width="2"/>
  <text x="664" y="420" font-size="14" font-weight="700" fill="#7a5400">The estimate</text>
  <text x="664" y="446" font-size="13" fill="#333">π  ≈  4 × (green / total)</text>
  <text x="664" y="468" font-size="13" fill="#333">π  ≈  4 × (91 / 120)</text>
  <text x="664" y="502" font-size="26" font-weight="800" fill="#7a5400">π  ≈  3.0333</text>
  <text x="664" y="528" font-size="11" fill="#777">(true value: 3.1415926…)</text>
  <text x="664" y="548" font-size="11" fill="#777">More darts → closer to π.</text>
  <text x="80" y="668" font-size="13" fill="#333"><tspan font-weight="700">Why does this work?</tspan> The probability that a random dart lands inside the quarter-circle equals (its area) / (square&apos;s area) = (π/4) / 1 = π/4.</text>
  <text x="80" y="690" font-size="13" fill="#333">So if we fire <tspan font-weight="700">N</tspan> darts and <tspan font-weight="700" fill="#1f8a3a">K</tspan> land inside, then K / N ≈ π/4, which means <tspan font-weight="700">π ≈ 4 × K / N</tspan>.</text>
  <text x="80" y="712" font-size="13" fill="#333">In Session 1 we run this with <tspan font-weight="700">N = 100,000,000</tspan> darts in both Python and Rust — and watch Rust win by a factor of ~100×.</text>
</svg>
